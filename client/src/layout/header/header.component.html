<header class="header">
  <h2>SkyShop</h2>

  <nav>
    <a routerLink="/shop/home" routerLinkActive="active">Shop</a>
    <a routerLink="/show-basket-list" routerLinkActive="active">Basket</a>
    @if (isAuthenticated()) {
      <span class="auth-label">{{ authEmail() }}</span>
      <button mat-button type="button" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/auth" routerLinkActive="active">Login</a>
    }
  </nav>

  <a
    class="cart-link custom-badge mt-2 mr-2"
    routerLink="/show-basket-list"
    routerLinkActive="active"
    aria-label="Open basket"
    [matBadge]="showBasketService.basketItemCount()"
    matBadgeSize="large"
  >
    <mat-icon>shopping_cart</mat-icon>
  </a>
</header>
