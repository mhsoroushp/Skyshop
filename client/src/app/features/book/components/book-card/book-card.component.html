<mat-card
  class="example-card cursor-pointer hover:shadow-lg transition-shadow"
  appearance="outlined"
  (click)="selectBook()">
  <mat-card-header>
    <div mat-card-avatar class="example-header-image"></div>
    <mat-card-title>{{book.title}}</mat-card-title>
    <mat-card-subtitle>{{book.author}}</mat-card-subtitle>
  </mat-card-header>
  <img mat-card-image src="https://material.angular.dev/assets/img/examples/shiba2.jpg" alt="Photo of a Shiba Inu">
  <mat-card-content>
    <p>
      {{book.description}}
    </p>
    <p>
      Price: {{book.price | currency}}
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button (click)="markFavorite()" matButton>Favorites</button>
  </mat-card-actions>
</mat-card>
