
<!-- skyshop/src/app/basket/components/add-to-basket/add-to-basket.component.html -->
<div class="add-to-basket">
  <h3>Add Product to Basket</h3>
  
  <div class="form-group">
    <label for="productId">Product ID:</label>
    <input 
      type="number" 
      id="productId" 
      [(ngModel)]="productId" 
      min="1"
    />
  </div>

  <div class="form-group">
    <label for="quantity">Quantity:</label>
    <input
      type="number"
      id="quantity"
      [(ngModel)]="quantity"
      min="1"
    />
  </div>
  
  <button (click)="addToBasket()">Add to Basket</button>
  
  <p *ngIf="message" class="{{ isError ? 'error' : 'success' }}">
    {{ message }}
  </p>
</div>
