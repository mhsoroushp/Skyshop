<!-- skyshop/src/app/basket/components/basket-list/basket-list.component.html -->
<div class="basket">
  <h2>Shopping Basket</h2>
  
  <div *ngIf="loading">⏳ Loading basket...</div>
  
  <div *ngIf="!loading && basketItems.length === 0">
    <p>Your basket is empty</p>
  </div>
  
  <div *ngIf="!loading && basketItems.length > 0" style="background: #e8f5e9; padding: 15px; border: 2px solid #4caf50;">
    <h3 style="color: #2e7d32;">✓ Your Basket Items ({{ count }})</h3>
    <ul class="basket-items" style="list-style: none; padding: 0;">
      <li *ngFor="let item of basketItems; let i = index" style="background: white; margin: 8px 0; padding: 10px; border-left: 4px solid #4caf50;">
        <div style="display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap;">
          <div>
            <div style="font-weight: bold;">Item {{ i + 1 }}: Product ID {{ item.productId }}</div>
            <div>Quantity: {{ item.quantity }}</div>
          </div>
          <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
            <label [attr.for]="'quantity-' + item.productId">Update quantity</label>
            <input
              type="number"
              [id]="'quantity-' + item.productId"
              min="1"
              [(ngModel)]="quantityEdits[item.productId]"
              style="width: 90px;"
            />
            <button (click)="updateQuantity(item.productId)" style="background: #1976d2; color: white; border: none; padding: 5px 10px; cursor: pointer;">Update</button>
            <button (click)="removeItem(item.productId)" style="background: #f44336; color: white; border: none; padding: 5px 10px; cursor: pointer;">Remove</button>
          </div>
        </div>
      </li>
    </ul>
    
    <p class="total" style="margin-top: 15px; font-weight: bold;">📊 Item count: {{ count }}</p>
    <p class="total" style="font-weight: bold;">📦 Total quantity: {{ total }}</p>
    
    <button class="clear-btn" (click)="clearBasket()" style="background: #ff9800; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-top: 10px;">Clear Basket</button>
  </div>
</div>
